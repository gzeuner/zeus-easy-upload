<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preview - Zeus Easy Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Preview and Type Mapping</h3>
        <a class="btn btn-outline-secondary" th:href="@{/}">Back</a>
    </div>

    <div th:if="${previewErrors != null and !previewErrors.isEmpty()}" class="alert alert-warning">
        <h6>CSV Warnings</h6>
        <ul class="mb-0">
            <li th:each="err : ${previewErrors}"
                th:text="'Row ' + ${err.rowNumber} + ': ' + ${err.message}"></li>
        </ul>
    </div>

    <form th:action="@{/import}" th:object="${importRequest}" method="post">
        <input type="hidden" th:field="*{useExistingTable}">
        <input type="hidden" th:field="*{existingTableName}">
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Library</label>
                        <input class="form-control" th:field="*{library}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Table Name</label>
                        <input class="form-control" th:field="*{tableName}" required>
                    </div>
                    <div class="col-md-4 d-flex align-items-end mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" th:field="*{dropAndRecreate}">
                            <label class="form-check-label">Drop table before create</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-3">
            <div class="card-header"><strong>Column Proposals</strong></div>
            <div class="table-responsive">
                <table class="table table-sm table-striped mb-0">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Original</th>
                        <th>Final Name</th>
                        <th>Detected</th>
                        <th>Type</th>
                        <th>Length</th>
                        <th>Precision</th>
                        <th>Scale</th>
                        <th>Nullable</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="col, stat : *{columns}">
                        <td th:text="${stat.index + 1}"></td>
                        <td>
                            <span th:text="${col.originalName}"></span>
                            <span class="badge text-bg-warning ms-1" th:if="${col.duplicate}">Dup</span>
                        </td>
                        <td>
                            <input type="hidden" th:field="*{columns[__${stat.index}__].index}">
                            <input type="hidden" th:field="*{columns[__${stat.index}__].originalName}">
                            <input type="hidden" th:field="*{columns[__${stat.index}__].sanitizedName}">
                            <input type="hidden" th:field="*{columns[__${stat.index}__].detectedType}">
                            <input type="hidden" th:field="*{columns[__${stat.index}__].duplicate}">
                            <input class="form-control form-control-sm" th:field="*{columns[__${stat.index}__].finalName}" required>
                        </td>
                        <td th:text="${col.detectedType}"></td>
                        <td>
                            <select class="form-select form-select-sm" th:field="*{columns[__${stat.index}__].sqlType}">
                                <option th:each="type : ${supportedTypes}" th:value="${type}" th:text="${type}"></option>
                            </select>
                        </td>
                        <td><input class="form-control form-control-sm" th:field="*{columns[__${stat.index}__].length}" type="number" min="1" max="4000"></td>
                        <td><input class="form-control form-control-sm" th:field="*{columns[__${stat.index}__].precision}" type="number" min="1" max="31"></td>
                        <td><input class="form-control form-control-sm" th:field="*{columns[__${stat.index}__].scale}" type="number" min="0" max="31"></td>
                        <td class="text-center"><input class="form-check-input" th:field="*{columns[__${stat.index}__].nullable}" type="checkbox"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card shadow-sm mb-3">
            <div class="card-header"><strong>CSV Preview (first 20 rows)</strong></div>
            <div class="table-responsive">
                <table class="table table-sm table-bordered mb-0">
                    <thead>
                    <tr>
                        <th th:each="col : *{columns}" th:text="${col.originalName}"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${previewContext.parsedCsv.previewRows}">
                        <td th:each="cell : ${row}" th:text="${cell}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card shadow-sm mb-3"
             th:if="${importRequest.useExistingTable and importRequest.existingTableName != null and !#strings.isEmpty(importRequest.existingTableName)}">
            <div class="card-header">
                <strong>Existing Table Metadata</strong>
                <span class="text-muted ms-2" th:text="${importRequest.library + '.' + importRequest.existingTableName}"></span>
            </div>
            <div class="table-responsive">
                <table class="table table-sm table-striped mb-0">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Column</th>
                        <th>Type</th>
                        <th>JDBC Type</th>
                        <th>Length</th>
                        <th>Scale</th>
                        <th>Nullable</th>
                        <th>Default</th>
                    </tr>
                    </thead>
                    <tbody id="existingColumnsBody"
                           th:attr="data-library=${importRequest.library},data-table=${importRequest.existingTableName}">
                    <tr>
                        <td colspan="8" class="text-muted">Loading metadata...</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <button type="submit" class="btn btn-success">Create Table and Import</button>
    </form>
</div>
<script>
    (() => {
        const body = document.getElementById("existingColumnsBody");
        if (!body) {
            return;
        }

        const library = (body.dataset.library || "").trim();
        const table = (body.dataset.table || "").trim();
        if (!library || !table) {
            body.innerHTML = "<tr><td colspan='8' class='text-muted'>No existing table selected.</td></tr>";
            return;
        }

        const renderRows = (columns) => {
            if (!columns || columns.length === 0) {
                body.innerHTML = "<tr><td colspan='8' class='text-muted'>No metadata columns found.</td></tr>";
                return;
            }
            body.innerHTML = columns.map((column) => {
                const ordinal = column.ordinalPosition ?? "";
                const type = column.typeName ?? "";
                const jdbcType = column.jdbcType ?? "";
                const length = column.length ?? "";
                const scale = column.scale ?? "";
                const nullable = column.nullable ? "YES" : "NO";
                const defaultValue = column.defaultValue ?? "";
                return `<tr>
                    <td>${ordinal}</td>
                    <td>${column.columnName || ""}</td>
                    <td>${type}</td>
                    <td>${jdbcType}</td>
                    <td>${length}</td>
                    <td>${scale}</td>
                    <td>${nullable}</td>
                    <td>${defaultValue}</td>
                </tr>`;
            }).join("");
        };

        fetch(`/meta/columns?library=${encodeURIComponent(library)}&table=${encodeURIComponent(table)}`)
            .then((response) => {
                if (!response.ok) {
                    throw new Error("Metadata endpoint returned " + response.status);
                }
                return response.json();
            })
            .then((columns) => renderRows(Array.isArray(columns) ? columns : []))
            .catch(() => {
                body.innerHTML = "<tr><td colspan='8' class='text-danger'>Could not load metadata columns.</td></tr>";
            });
    })();
</script>
</body>
</html>
