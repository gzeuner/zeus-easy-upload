name: Create Issues from V2_ROADMAP

on:
  workflow_dispatch: {}

permissions:
  issues: write
  contents: write

jobs:
  create_issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create issues from roadmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: https://api.github.com
        run: |
          python scripts/create_issues_from_roadmap.py

      - name: Commit CREATED_ISSUES.md
        run: |
          if [ -f CREATED_ISSUES.md ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CREATED_ISSUES.md
            git commit -m "docs: record created issues" || echo "Nothing to commit"
            git push
          fi